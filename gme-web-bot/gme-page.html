<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GME Web Bot</title>
</head>
<body>
  <!-- GME SDK requires this wrapper element -->
  <div id="gme-audio-wrap"></div>

  <script>
    // ============================================================
    // getUserMedia override — MUST run before SDK loads
    // Returns a custom MediaStream from AudioContext destination
    // so the SDK transmits our injected audio as "voice".
    // The GME SDK's EnableMic() -> initLocalStream() -> getUserMedia()
    // path picks up this stream, so the music becomes the mic input.
    // ============================================================

    const audioCtx = new AudioContext({ sampleRate: 48000 });
    const gainNode = audioCtx.createGain();
    const destination = audioCtx.createMediaStreamDestination();
    gainNode.connect(destination);

    // Keep a silent oscillator running so the stream always has an active
    // audio track (WebRTC drops tracks that never produce samples).
    const silentOsc = audioCtx.createOscillator();
    const silentGain = audioCtx.createGain();
    silentGain.gain.value = 0;
    silentOsc.connect(silentGain);
    silentGain.connect(destination);
    silentOsc.start();

    const fakeStream = destination.stream;

    // Override getUserMedia to return our custom stream for any audio request.
    const origGetUserMedia = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
    navigator.mediaDevices.getUserMedia = async function(constraints) {
      if (constraints && constraints.audio) {
        console.log('[GME-BOT] getUserMedia intercepted — returning injected audio stream');
        return fakeStream;
      }
      return origGetUserMedia(constraints);
    };

    // ============================================================
    // ITMG event codes (from GME H5 SDK: WebGMEAPI.fn.event)
    // ============================================================
    const GME_EVENT = {
      NONE: 0,
      ENTER_ROOM: 1,
      EXIT_ROOM: 2,
      ROOM_DISCONNECT: 3,
      USER_UPDATE: 4,
      LOCALSTREAM_READY: 5,
      REMOTESTREAM_IN: 6,
      REMOTESTREAM_PAUSED: 7,
      REMOTESTREAM_OUT: 8,
      SPEAKER_ENABLE_RESULT: 9,
      MICROPHONE_ENABLE_RESULT: 10,
      ACCOMPANY_FINISH: 11,
      START_ACCOMPANY: 12,
      SET_ACCOMPANY_VOLUME: 13,
    };
    // GME room type — cosmetic for the web SDK (TRTC mode is fixed), 3 = high quality
    const GME_ROOM_TYPE_HIGHQUALITY = 3;

    // ============================================================
    // State
    // ============================================================
    let currentSource = null;
    let currentBuffer = null;
    let pauseOffset = 0;
    let startTime = 0;
    let isPlaying = false;
    let isLooping = false;
    window.__songFinished = false;
    window.__gmeState = 'idle'; // idle, joining, joined, leaving, error
    window.__gmeError = null;
    window.__gmeEvents = [];

    // Promise resolvers for the async EnterRoom flow (event-driven in GME)
    let _enterResolve = null;
    let _enterReject = null;
    let _enterTimer = null;

    function pushEvent(type, data) {
      window.__gmeEvents.push({ type, data, ts: Date.now() });
      if (window.__gmeEvents.length > 50) window.__gmeEvents.shift();
    }

    // ============================================================
    // GME event delegate — SetTMGDelegate(cb) calls cb(eventType, result)
    // result = { errorCode, errorMsg, ... }
    // ============================================================
    function onGmeEvent(eventType, result) {
      const code = (result && (result.errorCode !== undefined ? result.errorCode : result.result));
      console.log('[GME] event=' + eventType + ' result=' + JSON.stringify(result));

      switch (eventType) {
        case GME_EVENT.ENTER_ROOM:
          if (code === 0) {
            window.__gmeState = 'joined';
            pushEvent('room_enter', result);
            // Open uplink (music-as-mic) and mute the local speaker path.
            try { window.__gme.EnableMic(true); } catch (e) { console.error('[GME] EnableMic error', e); }
            try { window.__gme.EnableSpeaker(false); } catch (e) {}
            try { window.__gme.SetMicVolume(100); } catch (e) {}
            if (_enterTimer) { clearTimeout(_enterTimer); _enterTimer = null; }
            if (_enterResolve) { _enterResolve({ ok: true }); _enterResolve = _enterReject = null; }
          } else {
            window.__gmeState = 'error';
            window.__gmeError = result;
            pushEvent('room_enter_failed', result);
            if (_enterTimer) { clearTimeout(_enterTimer); _enterTimer = null; }
            if (_enterReject) { _enterReject(new Error('EnterRoom failed: ' + JSON.stringify(result))); _enterResolve = _enterReject = null; }
          }
          break;
        case GME_EVENT.EXIT_ROOM:
          window.__gmeState = 'idle';
          pushEvent('room_exit', result);
          break;
        case GME_EVENT.ROOM_DISCONNECT:
          window.__gmeState = 'idle';
          window.__gmeError = result;
          pushEvent('room_disconnect', result);
          break;
        case GME_EVENT.USER_UPDATE:
          pushEvent('member', result);
          break;
        case GME_EVENT.MICROPHONE_ENABLE_RESULT:
          pushEvent('mic_enable', result);
          break;
        default:
          pushEvent('gme_event_' + eventType, result);
      }
    }

    // ============================================================
    // GME SDK interface — called from Puppeteer via page.evaluate()
    // ============================================================

    window.gmeInit = function(appId, openId) {
      return new Promise((resolve, reject) => {
        try {
          window.__gmeState = 'idle';
          window.__gmeError = null;

          if (typeof WebGMEAPI === 'undefined') {
            throw new Error('WebGMEAPI SDK not loaded');
          }

          // Bootstrap the SDK singleton: the WebGMEAPI constructor creates
          // WebGMEAPI.Param, the event enum, and AccompanyParam. Must run before
          // SetTMGDelegate/Init, or Init throws (WebGMEAPI.Param is undefined).
          new WebGMEAPI();
          window.__gme = WebGMEAPI.fn;
          window.__gme.SetTMGDelegate(onGmeEvent);
          // Init(document, sdkAppId, openId) — sets identity
          window.__gme.Init(document, Number(appId), String(openId));
          console.log('[GME] Init called appId=' + appId + ' openId=' + openId);

          // Init sets up state synchronously; give the SDK a tick to settle.
          setTimeout(() => resolve({ ok: true }), 300);
        } catch (e) {
          window.__gmeState = 'error';
          window.__gmeError = e.message;
          reject(e);
        }
      });
    };

    window.gmeEnterRoom = function(roomId, authBuffer) {
      return new Promise((resolve, reject) => {
        try {
          if (!window.__gme) throw new Error('GME not initialized');
          window.__gmeState = 'joining';
          window.__gmeError = null;

          _enterResolve = resolve;
          _enterReject = reject;
          // GME EnterRoom is event-driven: success/failure arrives via the
          // delegate (ITMG_MAIN_EVENT_TYPE_ENTER_ROOM). Guard with a timeout.
          _enterTimer = setTimeout(() => {
            if (_enterReject) {
              window.__gmeState = 'error';
              window.__gmeError = 'EnterRoom timeout';
              _enterReject(new Error('EnterRoom timeout (no ENTER_ROOM event in 25s)'));
              _enterResolve = _enterReject = null;
            }
          }, 25000);

          window.__gme.EnterRoom(String(roomId), GME_ROOM_TYPE_HIGHQUALITY, authBuffer);
          console.log('[GME] EnterRoom called room=' + roomId);
        } catch (e) {
          if (_enterTimer) { clearTimeout(_enterTimer); _enterTimer = null; }
          _enterResolve = _enterReject = null;
          window.__gmeState = 'error';
          window.__gmeError = e.message;
          reject(e);
        }
      });
    };

    window.gmeExitRoom = function() {
      return new Promise((resolve) => {
        try {
          if (!window.__gme) { resolve({ ok: true }); return; }
          window.__gmeState = 'leaving';
          window.__gme.ExitRoom();
          setTimeout(() => { window.__gmeState = 'idle'; resolve({ ok: true }); }, 300);
        } catch (e) {
          window.__gmeState = 'idle';
          resolve({ ok: true, warn: e.message });
        }
      });
    };

    // ============================================================
    // Audio playback — decode MP3 and inject into the getUserMedia stream
    // (unchanged from the working WebAudio approach)
    // ============================================================

    window.playAudio = async function(base64Data, loop) {
      window.stopAudio();

      isLooping = !!loop;
      window.__songFinished = false;

      const binaryStr = atob(base64Data);
      const bytes = new Uint8Array(binaryStr.length);
      for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

      currentBuffer = await audioCtx.decodeAudioData(bytes.buffer);
      _startPlayback(0);
      return { ok: true, duration: currentBuffer.duration };
    };

    function _startPlayback(offset) {
      if (!currentBuffer) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();

      currentSource = audioCtx.createBufferSource();
      currentSource.buffer = currentBuffer;
      currentSource.connect(gainNode);

      currentSource.onended = function() {
        if (isLooping && isPlaying) {
          _startPlayback(0);
        } else {
          isPlaying = false;
          window.__songFinished = true;
          console.log('[GME-BOT] Song finished');
          pushEvent('song_finished', {});
        }
      };

      currentSource.start(0, offset);
      startTime = audioCtx.currentTime - offset;
      pauseOffset = 0;
      isPlaying = true;
    }

    window.stopAudio = function() {
      if (currentSource) {
        try { currentSource.onended = null; currentSource.stop(); } catch (e) {}
        currentSource = null;
      }
      isPlaying = false;
      isLooping = false;
      pauseOffset = 0;
      currentBuffer = null;
      window.__songFinished = false;
      return { ok: true };
    };

    window.pauseAudio = function() {
      if (!isPlaying || !currentSource) return { ok: false, reason: 'not playing' };
      pauseOffset = audioCtx.currentTime - startTime;
      try { currentSource.onended = null; currentSource.stop(); } catch (e) {}
      currentSource = null;
      isPlaying = false;
      return { ok: true, offset: pauseOffset };
    };

    window.resumeAudio = function() {
      if (isPlaying || !currentBuffer || pauseOffset === 0) return { ok: false, reason: 'cannot resume' };
      _startPlayback(pauseOffset);
      return { ok: true };
    };

    window.setVolume = function(vol) {
      // vol: 0-100 → gain 0-1
      gainNode.gain.value = Math.max(0, Math.min(1, vol / 100));
      return { ok: true, volume: vol };
    };

    window.getPlaybackState = function() {
      return {
        isPlaying: isPlaying,
        songFinished: window.__songFinished,
        gmeState: window.__gmeState,
        gmeError: window.__gmeError,
        volume: Math.round(gainNode.gain.value * 100)
      };
    };

    console.log('[GME-BOT] Page loaded, getUserMedia overridden, audio context ready');
  </script>

  <!-- GME H5 SDK — loaded after getUserMedia override. Exposes window.WebGMEAPI -->
  <script src="sdk/WebRTCService.min.js"></script>

  <script>
    if (typeof WebGMEAPI !== 'undefined') {
      console.log('[GME-BOT] WebGMEAPI SDK loaded successfully');
      window.__sdkLoaded = true;
    } else {
      console.error('[GME-BOT] WebGMEAPI SDK failed to load');
      window.__sdkLoaded = false;
    }
  </script>
</body>
</html>
